; PlatformIO Project Configuration File
;
; VRC Facial Tracker - XIAO ESP32S3 Sense
;
; Environments:
;   xiao_stream     — WiFi camera + PC-side MediaPipe (recommended)
;   xiao_esp32s3    — On-device heuristic backend (standalone)
;   xiao_espidf     — On-device ESP-DL face detection (standalone)
;

[common]
platform = espressif32
board = seeed_xiao_esp32s3
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_USE_MALLOC
    -DCAMERA_MODEL_XIAO_ESP32S3
    -DCORE_DEBUG_LEVEL=1

monitor_filters = esp32_exception_decoder

; ============================================================
; DEFAULT: Stream mode — ESP32 = WiFi camera, PC = MediaPipe
; ============================================================
[env:xiao_stream]
extends = common
framework = arduino
board_build.arduino.memory_type = qio_opi
board_build.partitions = huge_app.csv
build_flags =
    ${common.build_flags}
    -DTRACKER_BACKEND=3
lib_deps =
    https://github.com/bblanchon/ArduinoJson.git

; ============================================================
; Arduino-only build (heuristic backend, standalone mode)
; ============================================================
[env:xiao_esp32s3]
extends = common
framework = arduino
board_build.arduino.memory_type = qio_opi
board_build.partitions = huge_app.csv
build_flags =
    ${common.build_flags}
    -DTRACKER_BACKEND=1
lib_deps =
    https://github.com/CNMAT/OSC.git
    https://github.com/bblanchon/ArduinoJson.git

; ============================================================
; ESP-IDF + Arduino hybrid build (ESP-DL face detection)
; ============================================================
[env:xiao_espidf]
extends = common
framework = espidf, arduino
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions.csv
build_flags =
    ${common.build_flags}
    -Wno-error=implicit-function-declaration
    -Wno-error=maybe-uninitialized
    -DTRACKER_USE_ESP_DL=1
    -DTRACKER_BACKEND=2
lib_deps =
    https://github.com/CNMAT/OSC.git
    https://github.com/bblanchon/ArduinoJson.git
